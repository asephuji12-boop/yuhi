<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>Data Siswa · Pesantren</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f4f7fc;
            padding: 20px;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(26, 35, 126, 0.2);
            padding: 24px 28px;
        }
        /* header */
        .header-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e8edf5;
            padding-bottom: 16px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: #1a237e;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-left h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #3f51b5;
            margin-left: 4px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .btn {
            background: white;
            border: 1px solid #cfd8e6;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1a237e;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }
        .btn-primary {
            background: #1a237e;
            border-color: #1a237e;
            color: white;
        }
        .btn-primary:hover {
            background: #0d1457;
            border-color: #0d1457;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #b0c0da;
        }
        .btn-outline:hover {
            background: #eef3fd;
            border-color: #1a237e;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        .btn-danger {
            background: #b71c1c;
            border-color: #b71c1c;
            color: white;
        }
        .btn-danger:hover {
            background: #8e0000;
            border-color: #8e0000;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #f8faff;
            border-radius: 20px;
            padding: 14px 16px;
            border-left: 5px solid #1a237e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }
        .stat-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #455a64;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a237e;
            line-height: 1.2;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: 18px;
            border: 1px solid #e2e9f2;
            background: #ffffff;
            margin-top: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 1200px;
        }
        th {
            background: #eef3fc;
            color: #1a237e;
            font-weight: 600;
            padding: 12px 8px;
            text-align: left;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #eef3f8;
            vertical-align: middle;
        }
        tr:hover td {
            background: #fafcff;
        }
        .clickable-name {
            color: #1a237e;
            font-weight: 500;
            cursor: pointer;
            text-decoration: underline dotted;
        }
        .badge-status {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
            background: #e8edf5;
            font-size: 0.75rem;
        }
        .pagination {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 14px 4px 6px 4px;
            gap: 10px;
        }
        .pagination select,
        .pagination button {
            background: white;
            border: 1px solid #d0dcec;
            border-radius: 30px;
            padding: 6px 16px;
            font-weight: 500;
        }
        .pagination button {
            background: #f2f6fe;
            cursor: pointer;
        }
        .pagination button:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        /* modal overlay */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }
        .modal.open {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 32px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px 30px;
            box-shadow: 0 40px 60px -20px rgba(0, 0, 0, 0.4);
            position: relative;
        }
        .modal-box h2 {
            font-size: 1.5rem;
            color: #1a237e;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #5c6b8a;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 20px;
        }
        .form-grid .full {
            grid-column: span 2;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group label {
            font-weight: 500;
            font-size: 0.8rem;
            color: #2c3e50;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #d7e0eb;
            border-radius: 16px;
            font-size: 0.9rem;
            background: #fafcff;
            transition: 0.1s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #1a237e;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.1);
        }
        .btn-submit {
            background: #1a237e;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
            width: fit-content;
        }
        .btn-submit:hover {
            background: #0d1457;
        }
        .login-wrapper {
            max-width: 380px;
            margin: 60px auto;
            background: white;
            padding: 40px 32px;
            border-radius: 40px;
            box-shadow: 0 20px 40px -12px rgba(26, 35, 126, 0.3);
        }
        .login-wrapper h2 {
            text-align: center;
            color: #1a237e;
        }
        .login-wrapper .form-group {
            margin-bottom: 16px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a237e;
            color: white;
            padding: 14px 26px;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            z-index: 1200;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }
        .text-muted {
            color: #5a6c8a;
            font-size: 0.8rem;
        }
        .flex {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .mt-2 {
            margin-top: 12px;
        }
        @media (max-width: 700px) {
            .app-container {
                padding: 16px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-grid .full {
                grid-column: span 1;
            }
            .header-left h1 {
                font-size: 1.4rem;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- login screen -->
        <div id="loginScreen" class="login-wrapper" style="display:block;">
            <h2>🔐 Login</h2>
            <div class="form-group">
                <label>Username</label>
                <input id="loginUser" placeholder="admin" value="admin">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input id="loginPass" type="password" placeholder="admin123" value="admin123">
            </div>
            <button class="btn-submit" id="loginBtn" style="width:100%;justify-content:center;">Masuk</button>
            <div style="margin-top:10px;font-size:0.8rem;color:#5a6c8a;">Admin default: admin / admin123</div>
        </div>

        <!-- main app -->
        <div id="mainApp" style="display:none;">
            <div class="app-container">
                <!-- header -->
                <div class="header-row">
                    <div class="header-left">
                        <h1>📚 Data Siswa <small>Pesantren Darul Ilmi</small></h1>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="btnTambah">➕ Tambah</button>
                        <button class="btn btn-outline" id="btnCari">🔍 Cari</button>
                        <div class="btn-group" style="position:relative;">
                            <button class="btn btn-outline" id="btnTampilan">📊 Tampilan ▾</button>
                            <div id="dropdownTampilan" style="display:none;position:absolute;top:40px;right:0;background:white;border-radius:20px;box-shadow:0 12px 30px rgba(0,0,0,0.15);padding:8px 0;min-width:180px;z-index:50;">
                                <button class="dropdown-item" data-view="kelas">📚 Tampilan Kelas</button>
                                <button class="dropdown-item" data-view="tahfidz">📖 Tampilan Tahfidz</button>
                                <button class="dropdown-item" data-view="kamar">🛏️ Tampilan Kamar</button>
                                <button class="dropdown-item" data-view="filter">🔎 Filter Lanjutan</button>
                            </div>
                        </div>
                        <button class="btn btn-outline" id="btnImportCSV">📤 Import CSV</button>
                        <button class="btn btn-outline" id="btnExportCSV">📥 Ekspor CSV</button>
                        <button class="btn btn-outline btn-sm" id="btnKelolaUser" style="display:none;">👥 User</button>
                        <button class="btn btn-outline btn-sm" id="btnLogout">🚪 Keluar</button>
                    </div>
                </div>

                <!-- stats -->
                <div class="stats-grid" id="statsContainer">
                    <div class="stat-card"><div class="label">📍 Alamat</div><div class="value" id="statAlamat">-</div></div>
                    <div class="stat-card"><div class="label">🏫 Kelas</div><div class="value" id="statKelas">-</div></div>
                    <div class="stat-card"><div class="label">📖 Tahfidz</div><div class="value" id="statTahfidz">-</div></div>
                    <div class="stat-card"><div class="label">🛏️ Kamar</div><div class="value" id="statKamar">-</div></div>
                </div>

                <!-- tabel -->
                <div class="table-wrap" id="tableWrap">
                    <table>
                        <thead><tr id="tableHead"></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <!-- pagination -->
                <div class="pagination">
                    <div>
                        <select id="pageSizeSelect"><option value="25">25</option><option value="50">50</option><option value="100">100</option><option value="999999">Semua</option></select>
                        <span style="margin-left:10px;" id="pageInfo">1-0 dari 0</span>
                    </div>
                    <div>
                        <button id="prevPage">◀ Prev</button>
                        <button id="nextPage">Next ▶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- modal container -->
    <div id="modalContainer" class="modal"></div>
    <div id="toastMessage" class="toast">✅ Sukses</div>

    <script>
        // ========== FIREBASE CONFIG (GANTI DENGAN MILIK ANDA) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBFbiI8A9fzGwKfE5ZWzXHcN_819e-nQEA",
            authDomain: "yihn-9da06.firebaseapp.com",
            projectId: "yihn-9da06",
            storageBucket: "yihn-9da06.firebasestorage.app",
            messagingSenderId: "540843053814",
            appId: "1:540843053814:web:e5128f2f8fe55e2461d2d7"
        };
        // =================================================================

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        // untuk development test mode, tidak perlu auth

        // state
        let allStudents = [];
        let filteredStudents = [];
        let currentUser = null;
        let currentPage = 1;
        let pageSize = 25;

        // DOM refs
        const $ = id => document.getElementById(id);
        const loginScreen = $('loginScreen');
        const mainApp = $('mainApp');
        const loginBtn = $('loginBtn');
        const loginUser = $('loginUser');
        const loginPass = $('loginPass');
        const btnLogout = $('btnLogout');
        const btnTambah = $('btnTambah');
        const btnCari = $('btnCari');
        const btnTampilan = $('btnTampilan');
        const dropdownTampilan = $('dropdownTampilan');
        const btnImportCSV = $('btnImportCSV');
        const btnExportCSV = $('btnExportCSV');
        const btnKelolaUser = $('btnKelolaUser');
        const tableHead = $('tableHead');
        const tableBody = $('tableBody');
        const pageSizeSelect = $('pageSizeSelect');
        const pageInfo = $('pageInfo');
        const prevPage = $('prevPage');
        const nextPage = $('nextPage');
        const modalContainer = $('modalContainer');
        const toast = $('toastMessage');

        const columns = ['No', 'Id', 'Nama', 'Alamat', 'Status', 'Diniyyah', 'Tahfidz', 'Kamar', 'Kedudukan',
            'Tgl Terdata', 'Tgl Keluar', 'Keterangan', 'No Yayasan', 'Catatan Awal', 'Catatan Akhir', 'Kelas Akhir'
        ];

        // ================== HELPERS ==================
        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.style.background = isError ? '#b71c1c' : '#1a237e';
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function openModal(html) {
            modalContainer.innerHTML = html;
            modalContainer.classList.add('open');
        }

        function closeModal() {
            modalContainer.classList.remove('open');
        }

        function getStatusBadge(s) {
            const colors = { 'Aktif': '#1a7e3a', 'Pindah': '#b06b1a', 'Lulus': '#0d47a1', 'Cuti': '#7b4b9a',
                'Keluar': '#b71c1c' };
            return `<span class="badge-status" style="background:${colors[s]||'#e8edf5'};color:white;">${s||'-'}</span>`;
        }

        function formatDate(d) {
            if (!d) return '-';
            try { return new Date(d).toLocaleDateString('id-ID'); } catch (e) { return d; }
        }

        // ================== LOGIN ==================
        loginBtn.onclick = async () => {
            const u = loginUser.value.trim(),
                p = loginPass.value.trim();
            if (u === 'admin' && p === 'admin123') {
                currentUser = { username: 'admin', isAdmin: true };
                enterApp();
                return;
            }
            // cek firestore users
            try {
                const snap = await db.collection('users').where('username', '==', u).get();
                if (snap.empty) { showToast('Username tidak ditemukan', true); return; }
                let found = false;
                snap.forEach(doc => {
                    if (doc.data().password === p) { found = true;
                        currentUser = { username: u, uid: doc.id, ...doc.data() }; }
                });
                if (found) { enterApp(); } else { showToast('Password salah', true); }
            } catch (e) { showToast('Error login: ' + e.message, true); }
        };

        function enterApp() {
            loginScreen.style.display = 'none';
            mainApp.style.display = 'block';
            btnKelolaUser.style.display = (currentUser && currentUser.isAdmin) ? 'inline-flex' : 'none';
            loadData();
        }

        btnLogout.onclick = () => {
            currentUser = null;
            mainApp.style.display = 'none';
            loginScreen.style.display = 'block';
        };

        // ================== CRUD ==================
        async function loadData() {
            tableBody.innerHTML = `<tr><td colspan="${columns.length}" style="text-align:center;padding:40px;">⏳ Memuat data...</td></tr>`;
            try {
                const snap = await db.collection('siswa').get();
                allStudents = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    d._id = doc.id;
                    allStudents.push(d);
                });
                // urutkan berdasarkan No atau id
                allStudents.sort((a, b) => (a.No || 0) - (b.No || 0));
                applyFiltersAndRender();
                updateStats();
            } catch (e) {
                tableBody.innerHTML = `<tr><td colspan="${columns.length}" style="text-align:center;padding:40px;color:#b71c1c;">Gagal memuat data: ${e.message}</td></tr>`;
                showToast('Gagal load data: ' + e.message, true);
            }
        }

        function applyFiltersAndRender() {
            // default: semua
            filteredStudents = [...allStudents];
            // jika ada filter dari dropdown/view
            renderTable();
        }

        function renderTable() {
            const start = (currentPage - 1) * pageSize;
            const end = pageSize === 999999 ? filteredStudents.length : start + pageSize;
            const pageData = filteredStudents.slice(start, end);

            // head
            tableHead.innerHTML = `<tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr>`;

            if (pageData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="${columns.length}" style="text-align:center;padding:40px;">Tidak ada data</td></tr>`;
                pageInfo.textContent = `0 dari 0`;
                return;
            }
            let html = '';
            pageData.forEach((s, idx) => {
                const row = columns.map(col => {
                    let val = s[col] ?? '-';
                    if (col === 'Status') val = getStatusBadge(val);
                    if (col === 'Nama') val = `<span class="clickable-name" data-id="${s._id}">${val}</span>`;
                    if (col === 'Tgl Terdata' || col === 'Tgl Keluar') val = formatDate(val);
                    return `<td>${val}</td>`;
                }).join('');
                html += `<tr>${row}</tr>`;
            });
            tableBody.innerHTML = html;
            // event klik nama untuk detail
            document.querySelectorAll('.clickable-name').forEach(el => {
                el.onclick = () => {
                    const id = el.dataset.id;
                    const data = allStudents.find(s => s._id === id);
                    if (data) showDetail(data);
                };
            });
            const total = filteredStudents.length;
            const from = total === 0 ? 0 : start + 1;
            const to = Math.min(end, total);
            pageInfo.textContent = `${from}-${to} dari ${total}`;
            prevPage.disabled = currentPage === 1;
            nextPage.disabled = end >= total;
        }

        // ========== STATISTIK (hanya status Aktif) ==========
        function updateStats() {
            const aktif = allStudents.filter(s => s.Status === 'Aktif');
            const alamat = new Set(aktif.map(s => s.Alamat).filter(Boolean));
            const kelas = new Set(aktif.map(s => s['Kelas Akhir']).filter(Boolean));
            const tahfidz = new Set(aktif.map(s => s.Tahfidz).filter(Boolean));
            const kamar = new Set(aktif.map(s => s.Kamar).filter(Boolean));
            $('statAlamat').textContent = alamat.size;
            $('statKelas').textContent = kelas.size;
            $('statTahfidz').textContent = tahfidz.size;
            $('statKamar').textContent = kamar.size;
        }

        // ========== MODAL TAMBAH ==========
        btnTambah.onclick = () => {
            if (!currentUser) return showToast('Login dulu', true);
            openModalForm(null);
        };

        function openModalForm(data) {
            const isEdit = !!data;
            const fields = columns.filter(c => !['No', 'Id'].includes(c));
            let html = `<div class="modal-box">
            <h2>${isEdit ? '✏️ Edit' : '➕ Tambah'} Siswa <button class="modal-close" onclick="closeModal()">✕</button></h2>
            <form id="formSiswa" class="form-grid">`;
            fields.forEach(col => {
                const val = data ? (data[col] ?? '') : '';
                const required = ['Nama', 'Alamat', 'Kelas Akhir', 'Keterangan'].includes(col);
                const label = col;
                let input = '';
                if (col === 'Status') {
                    const opts = ['Aktif', 'Pindah', 'Lulus', 'Cuti', 'Keluar'];
                    input =
                        `<select id="f_${col}">${opts.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
                } else if (col === 'Diniyyah') {
                    const opts = ['Ula', 'Wustha', 'Ulya', 'Takhasus'];
                    input =
                        `<select id="f_${col}">${opts.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
                } else if (col === 'Tgl Terdata' || col === 'Tgl Keluar') {
                    input = `<input type="date" id="f_${col}" value="${val}" />`;
                } else if (col === 'Catatan Awal' || col === 'Catatan Akhir') {
                    input = `<textarea id="f_${col}" rows="2">${val}</textarea>`;
                } else {
                    input = `<input type="text" id="f_${col}" value="${val}" ${required?'required':''} />`;
                }
                html += `<div class="form-group ${required?'full':''}">
              <label>${label} ${required?'*':''}</label>
              ${input}
            </div>`;
            });
            html += `<div class="full" style="display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;">
              <button type="submit" class="btn-submit">${isEdit ? 'Update' : 'Simpan'}</button>
              ${isEdit && currentUser && currentUser.isAdmin ? `<button type="button" class="btn btn-danger" id="btnHapusDariForm">🗑️ Hapus</button>` : ''}
              <button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>
            </div></form></div>`;
            openModal(html);
            if (isEdit && currentUser && currentUser.isAdmin) {
                document.getElementById('btnHapusDariForm').onclick = () => confirmDeleteStudent(data._id);
            }
            const form = document.getElementById('formSiswa');
            form.onsubmit = async (e) => {
                e.preventDefault();
                const obj = {};
                fields.forEach(col => {
                    const el = document.getElementById(`f_${col}`);
                    if (el) obj[col] = el.value;
                });
                // validasi
                if (!obj.Nama || !obj.Alamat || !obj['Kelas Akhir'] || !obj.Keterangan) {
                    showToast('Nama, Alamat, Kelas Akhir, Keterangan wajib diisi', true);
                    return;
                }
                try {
                    if (isEdit) {
                        await db.collection('siswa').doc(data._id).update(obj);
                        showToast('Data diupdate');
                    } else {
                        const maxNo = allStudents.reduce((m, s) => Math.max(m, Number(s.No) || 0), 0);
                        obj.No = maxNo + 1;
                        await db.collection('siswa').add(obj);
                        showToast('Siswa ditambahkan');
                    }
                    closeModal();
                    loadData();
                } catch (err) { showToast('Gagal: ' + err.message, true); }
            };
        }

        // ========== DETAIL ==========
        function showDetail(data) {
            const canDelete = currentUser && currentUser.isAdmin;
            let html = `<div class="modal-box">
            <h2>📋 Detail Siswa <button class="modal-close" onclick="closeModal()">✕</button></h2>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;">`;
            columns.forEach(c => {
                const val = data[c] ?? '-';
                html += `<div><strong>${c}</strong><br><span>${c==='Status'?getStatusBadge(val):val}</span></div>`;
            });
            html += `</div><div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="openModalFormFromDetail('${data._id}')">✏️ Edit</button>
            ${canDelete ? `<button class="btn btn-danger" onclick="confirmDeleteStudent('${data._id}')">🗑️ Hapus</button>` : ''}
            <button class="btn btn-outline" onclick="closeModal()">Tutup</button>
          </div></div>`;
            openModal(html);
            window._detailId = data._id;
        }

        window.confirmDeleteStudent = async function(id) {
            if (!currentUser || !currentUser.isAdmin) { showToast('Hanya admin yang dapat menghapus data', true); return; }
            const data = allStudents.find(s => s._id === id);
            if (!data) return;
            if (!confirm(`Yakin ingin menghapus data "${data.Nama}"? Tindakan ini tidak dapat dibatalkan.`)) return;
            try {
                await db.collection('siswa').doc(id).delete();
                closeModal();
                showToast('🗑️ Data berhasil dihapus');
                loadData();
            } catch (e) { showToast('Gagal menghapus: ' + e.message, true); }
        };

        window.openModalFormFromDetail = function(id) {
            const data = allStudents.find(s => s._id === id);
            closeModal();
            if (data) openModalForm(data);
        };

        // ========== PENCARIAN ==========
        btnCari.onclick = () => {
            if (!currentUser) return showToast('Login dulu', true);
            let html = `<div class="modal-box">
            <h2>🔍 Cari & Edit <button class="modal-close" onclick="closeModal()">✕</button></h2>
            <input type="text" id="searchInput" placeholder="Cari nama, alamat, no yayasan..." style="width:100%;padding:12px;border-radius:30px;border:1px solid #d7e0eb;font-size:1rem;margin-bottom:16px;">
            <div id="searchResults" style="max-height:400px;overflow-y:auto;"></div>
          </div>`;
            openModal(html);
            const input = document.getElementById('searchInput');
            input.oninput = debounce(() => {
                const q = input.value.toLowerCase().trim();
                const res = allStudents.filter(s =>
                    (s.Nama || '').toLowerCase().includes(q) ||
                    (s.Alamat || '').toLowerCase().includes(q) ||
                    (s['No Yayasan'] || '').toLowerCase().includes(q)
                );
                const container = document.getElementById('searchResults');
                if (res.length === 0) { container.innerHTML = '<p class="text-muted">Tidak ditemukan</p>'; return; }
                container.innerHTML = res.map(s =>
                    `<div style="padding:8px 12px;border-bottom:1px solid #edf2f9;display:flex;justify-content:space-between;align-items:center;">
                <span><strong>${s.Nama}</strong> (${s.Alamat})</span>
                <button class="btn btn-sm btn-primary" onclick="editFromSearch('${s._id}')">Edit</button>
              </div>`
                ).join('');
            }, 300);
        };

        window.editFromSearch = function(id) {
            const data = allStudents.find(s => s._id === id);
            closeModal();
            if (data) openModalForm(data);
        };

        function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t);
                t = setTimeout(() => fn(...a), ms); }; }

        // ========== KELOLA USER (admin only) ==========
        btnKelolaUser.onclick = () => {
            if (!currentUser || !currentUser.isAdmin) { showToast('Hanya admin yang dapat mengelola pengguna', true); return; }
            openUserManagement();
        };

        function openUserManagement() {
            let html = `<div class="modal-box"><h2>👥 Kelola Pengguna <button class="modal-close" onclick="closeModal()">✕</button></h2>
            <div id="userListContainer"><p class="text-muted">Memuat...</p></div>
            <hr style="margin:18px 0;border:none;border-top:1px solid #eef3f8;">
            <h3 style="font-size:1rem;color:#1a237e;margin-bottom:10px;">➕ Tambah Pengguna</h3>
            <div class="form-grid">
              <div class="form-group"><label>Username</label><input id="newUserName" placeholder="username"></div>
              <div class="form-group"><label>Password</label><input id="newUserPass" type="text" placeholder="password"></div>
              <div class="form-group full" style="flex-direction:row;align-items:center;gap:8px;">
                <input type="checkbox" id="newUserAdmin" style="width:auto;"> <label style="margin:0;">Jadikan admin</label>
              </div>
            </div>
            <button class="btn btn-primary mt-2" id="addUserBtn">Tambah Pengguna</button>
          </div>`;
            openModal(html);
            renderUserList();
            document.getElementById('addUserBtn').onclick = async () => {
                const uname = document.getElementById('newUserName').value.trim();
                const upass = document.getElementById('newUserPass').value.trim();
                const uadmin = document.getElementById('newUserAdmin').checked;
                if (!uname || !upass) { showToast('Username dan password wajib diisi', true); return; }
                if (uname.toLowerCase() === 'admin') { showToast('Username "admin" sudah dipakai sistem', true); return; }
                try {
                    const existing = await db.collection('users').where('username', '==', uname).get();
                    if (!existing.empty) { showToast('Username sudah dipakai', true); return; }
                    await db.collection('users').add({ username: uname, password: upass, isAdmin: uadmin });
                    showToast('Pengguna ditambahkan');
                    document.getElementById('newUserName').value = '';
                    document.getElementById('newUserPass').value = '';
                    document.getElementById('newUserAdmin').checked = false;
                    renderUserList();
                } catch (e) { showToast('Gagal: ' + e.message, true); }
            };
        }

        async function renderUserList() {
            const container = document.getElementById('userListContainer');
            if (!container) return;
            try {
                const snap = await db.collection('users').get();
                let html = `<div style="padding:8px 12px;border-bottom:1px solid #edf2f9;display:flex;justify-content:space-between;font-weight:600;color:#1a237e;">
              <span>admin (default sistem)</span><span class="badge-status">Admin</span>
            </div>`;
                if (snap.empty) {
                    html += '<p class="text-muted" style="padding:10px 12px;">Belum ada pengguna tambahan.</p>';
                } else {
                    snap.forEach(doc => {
                        const u = doc.data();
                        html += `<div style="padding:8px 12px;border-bottom:1px solid #edf2f9;display:flex;justify-content:space-between;align-items:center;">
                  <span>${u.username} ${u.isAdmin ? '<span class="badge-status">Admin</span>' : ''}</span>
                  <button class="btn btn-sm btn-danger" onclick="deleteUser('${doc.id}')">Hapus</button>
                </div>`;
                    });
                }
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<p class="text-muted">Gagal memuat pengguna: ${e.message}</p>`;
            }
        }

        window.deleteUser = async function(id) {
            if (!confirm('Yakin ingin menghapus pengguna ini?')) return;
            try {
                await db.collection('users').doc(id).delete();
                showToast('Pengguna dihapus');
                renderUserList();
            } catch (e) { showToast('Gagal: ' + e.message, true); }
        };

        // ========== TAMPILAN / FILTER ==========
        btnTampilan.onclick = (e) => {
            e.stopPropagation();
            dropdownTampilan.style.display = dropdownTampilan.style.display === 'block' ? 'none' : 'block';
        };
        document.addEventListener('click', () => dropdownTampilan.style.display = 'none');
        document.querySelectorAll('.dropdown-item').forEach(el => {
            el.onclick = () => {
                dropdownTampilan.style.display = 'none';
                const view = el.dataset.view;
                if (view === 'filter') openFilterModal();
                else if (view === 'kelas') filterBy('Kelas Akhir');
                else if (view === 'tahfidz') filterBy('Tahfidz');
                else if (view === 'kamar') filterBy('Kamar');
            };
        });

        function filterBy(col) {
            const vals = [...new Set(allStudents.map(s => s[col]).filter(Boolean))].sort();
            if (vals.length === 0) { showToast('Tidak ada data untuk kolom ini'); return; }
            let html = `<div class="modal-box"><h2>📊 Tampilan ${col} <button class="modal-close" onclick="closeModal()">✕</button></h2>
            <p class="text-muted" style="margin-bottom:10px;">Klik salah satu nilai untuk menampilkan datanya di tabel.</p>
            <div id="tampilanList"></div>
            <button class="btn btn-outline mt-2" id="resetTampilanBtn">Tampilkan Semua</button></div>`;
            openModal(html);
            const listEl = document.getElementById('tampilanList');
            listEl.innerHTML = vals.map(v => {
                const count = allStudents.filter(s => s[col] === v).length;
                return `<div class="tampilan-row" style="padding:8px 10px;border-bottom:1px solid #eef3f8;display:flex;justify-content:space-between;align-items:center;cursor:pointer;"><span>${v}</span><span class="badge-status">${count} siswa</span></div>`;
            }).join('');
            [...listEl.children].forEach((el, idx) => {
                el.onclick = () => {
                    filteredStudents = allStudents.filter(s => s[col] === vals[idx]);
                    currentPage = 1;
                    renderTable();
                    closeModal();
                    showToast(`Menampilkan ${filteredStudents.length} siswa (${col}: ${vals[idx]})`);
                };
            });
            document.getElementById('resetTampilanBtn').onclick = resetFilter;
        }

        function resetFilter() {
            filteredStudents = [...allStudents];
            currentPage = 1;
            renderTable();
            closeModal();
        }

        function openFilterModal() {
            let html = `<div class="modal-box"><h2>🔎 Filter Lanjutan <button class="modal-close" onclick="closeModal()">✕</button></h2>
            <div class="form-grid">
              <div class="form-group"><label>Status</label><select id="filterStatus"><option value="">Semua</option>${['Aktif','Pindah','Lulus','Cuti','Keluar'].map(o=>`<option value="${o}">${o}</option>`).join('')}</select></div>
              <div class="form-group"><label>Diniyyah</label><select id="filterDiniyyah"><option value="">Semua</option>${['Ula','Wustha','Ulya','Takhasus'].map(o=>`<option value="${o}">${o}</option>`).join('')}</select></div>
              <div class="form-group"><label>Kelas Akhir</label><input id="filterKelas" placeholder="Kelas"></div>
              <div class="form-group"><label>Tgl Terdata (mulai)</label><input type="date" id="filterTgl"></div>
            </div>
            <div style="display:flex;gap:8px;margin-top:12px;">
              <button class="btn btn-primary" id="applyFilterBtn">Terapkan</button>
              <button class="btn btn-outline" onclick="resetFilter()">Reset</button>
            </div></div>`;
            openModal(html);
            document.getElementById('applyFilterBtn').onclick = () => {
                const status = document.getElementById('filterStatus').value;
                const diniyyah = document.getElementById('filterDiniyyah').value;
                const kelas = document.getElementById('filterKelas').value.trim();
                const tgl = document.getElementById('filterTgl').value;
                filteredStudents = allStudents.filter(s => {
                    if (status && s.Status !== status) return false;
                    if (diniyyah && s.Diniyyah !== diniyyah) return false;
                    if (kelas && (s['Kelas Akhir'] || '').toLowerCase() !== kelas.toLowerCase()) return false;
                    if (tgl && s['Tgl Terdata'] !== tgl) return false;
                    return true;
                });
                currentPage = 1;
                renderTable();
                closeModal();
                showToast(`Menampilkan ${filteredStudents.length} data`);
            };
        }

        // ========== EXPORT CSV ==========
        btnExportCSV.onclick = () => {
            if (allStudents.length === 0) { showToast('Tidak ada data untuk diekspor', true); return; }
            const header = columns.join(',');
            const rows = allStudents.map(s => columns.map(c => `"${(s[c]??'').toString().replace(/"/g,'""')}"`).join(','));
            const csv = [header, ...rows].join('\n');
            const bom = '\uFEFF';
            const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `data_siswa_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        };

        // ========== IMPORT CSV ==========
        // Parser CSV yang benar (mendukung field berkutip dengan koma/newline/kutip di dalamnya)
        function parseCSV(text) {
            if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // buang BOM
            const rows = [];
            let row = [],
                field = '',
                inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                if (inQuotes) {
                    if (c === '"') {
                        if (text[i + 1] === '"') { field += '"';
                            i++; } else { inQuotes = false; }
                    } else { field += c; }
                } else {
                    if (c === '"') { inQuotes = true; } else if (c === ',') { row.push(field);
                        field = ''; } else if (c === '\r') { /* skip, \n menyusul */ } else if (c === '\n') {
                        row.push(field);
                        field = '';
                        rows.push(row);
                        row = [];
                    } else { field += c; }
                }
            }
            if (field.length > 0 || row.length > 0) { row.push(field);
                rows.push(row); }
            return rows.filter(r => !(r.length === 1 && r[0].trim() === ''));
        }

        btnImportCSV.onclick = () => {
            if (!currentUser) return showToast('Login dulu', true);
            let html = `<div class="modal-box"><h2>📤 Import CSV <button class="modal-close" onclick="closeModal()">✕</button></h2>
            <p class="text-muted">Upload file CSV dengan header sesuai kolom (kolom No &amp; Id opsional). Max 5MB.</p>
            <input type="file" id="csvFileInput" accept=".csv" style="margin:12px 0;">
            <div id="importProgress" style="margin:8px 0;"></div>
            <button class="btn btn-primary" id="importBtn">Upload & Import</button>
            <button class="btn btn-outline" onclick="closeModal()">Batal</button>
          </div>`;
            openModal(html);
            document.getElementById('importBtn').onclick = async () => {
                const fileInput = document.getElementById('csvFileInput');
                const file = fileInput.files[0];
                if (!file) { showToast('Pilih file CSV', true); return; }
                if (file.size > 5 * 1024 * 1024) { showToast('Ukuran file maksimal 5MB', true); return; }
                const progressEl = document.getElementById('importProgress');
                const importBtn = document.getElementById('importBtn');
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const rows = parseCSV(e.target.result);
                    if (rows.length < 2) { showToast('CSV kosong atau hanya header', true); return; }
                    const header = rows[0].map(h => h.trim());
                    // No dan Id bersifat opsional, kolom lain wajib ada di header
                    const requiredHeaderCols = columns.filter(c => c !== 'No' && c !== 'Id');
                    const missing = requiredHeaderCols.filter(c => !header.includes(c));
                    if (missing.length) { showToast('Header tidak sesuai, kolom hilang: ' + missing.join(', '), true); return; }
                    importBtn.disabled = true;
                    let success = 0,
                        errors = [];
                    let nextNo = allStudents.reduce((m, s) => Math.max(m, Number(s.No) || 0), 0) + 1;
                    const total = rows.length - 1;
                    for (let i = 1; i < rows.length; i++) {
                        progressEl.textContent = `Memproses baris ${i} dari ${total}...`;
                        const vals = rows[i];
                        const obj = {};
                        header.forEach((h, idx) => { obj[h] = (vals[idx] ?? '').trim(); });
                        if (!obj.Nama || !obj.Alamat || !obj['Kelas Akhir'] || !obj.Keterangan) {
                            errors.push(`Baris ${i+1}: Nama, Alamat, Kelas Akhir, Keterangan wajib`);
                            continue;
                        }
                        if (obj.Id) {
                            const exist = allStudents.find(s => s.Id === obj.Id);
                            if (exist) {
                                errors.push(`Baris ${i+1}: Id duplikat (${obj.Id}) - dilewati`);
                                continue;
                            }
                        }
                        if (!header.includes('No') || !obj.No) { obj.No = nextNo++; }
                        try {
                            await db.collection('siswa').add(obj);
                            success++;
                        } catch (err) { errors.push(`Baris ${i+1}: ${err.message}`); }
                    }
                    closeModal();
                    showToast(`✅ Berhasil import ${success} data. ${errors.length} error.`);
                    if (errors.length) console.warn('Error import:', errors);
                    loadData();
                };
                reader.readAsText(file);
            };
        };

        // ========== PAGINATION ==========
        pageSizeSelect.onchange = () => {
            pageSize = parseInt(pageSizeSelect.value);
            currentPage = 1;
            renderTable();
        };
        prevPage.onclick = () => { if (currentPage > 1) { currentPage--;
                renderTable(); } };
        nextPage.onclick = () => {
            const maxPage = Math.ceil(filteredStudents.length / pageSize);
            if (currentPage < maxPage) { currentPage++;
                renderTable(); }
        };

        // ========== INIT ==========
        // jika sudah login, load data

        // handle enter pada login
        loginPass.onkeydown = (e) => { if (e.key === 'Enter') loginBtn.click(); };
        loginUser.onkeydown = (e) => { if (e.key === 'Enter') loginBtn.click(); };

        // cek session sederhana
        // start
        console.log('Aplikasi siap. Gunakan admin/admin123');
    </script>
</body>
</html>
